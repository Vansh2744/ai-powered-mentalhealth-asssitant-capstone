version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent_db
    restart: always
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voice_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
